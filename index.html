<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #181818;
            color: #fff;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #202020;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-icon {
            cursor: pointer;
            font-size: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            background-color: #ff0000;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-center {
            flex: 1;
            max-width: 600px;
            display: flex;
            margin: 0 40px;
        }

        .search-bar {
            width: 100%;
            padding: 10px 15px;
            background-color: #121212;
            border: 1px solid #303030;
            border-radius: 2px 0 0 2px;
            color: #fff;
            outline: none;
        }

        .search-btn {
            padding: 0 20px;
            background-color: #303030;
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 2px 2px 0;
            cursor: pointer;
            color: #fff;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .header-icon {
            font-size: 24px;
            cursor: pointer;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background-color: #ff0000;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 56px;
            width: 240px;
            height: calc(100vh - 56px);
            background-color: #202020;
            padding: 12px 0;
            overflow-y: auto;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 10px 24px;
            cursor: pointer;
            gap: 24px;
        }

        .sidebar-item:hover {
            background-color: #303030;
        }

        .sidebar-item.active {
            background-color: #303030;
        }

        .sidebar-divider {
            height: 1px;
            background-color: #303030;
            margin: 12px 0;
        }

        /* Main Content */
        .main {
            margin-left: 240px;
            margin-top: 56px;
            padding: 20px;
        }

        .categories {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .category-btn {
            padding: 8px 16px;
            background-color: #303030;
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
        }

        .category-btn.active {
            background-color: #fff;
            color: #000;
        }

        /* Videos Grid */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .video-card {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .video-card:hover .video-thumbnail {
            opacity: 0.85;
        }

        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            margin-bottom: 12px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            transition: opacity 0.2s;
            overflow: hidden;
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0,0,0,0.8);
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .video-info {
            display: flex;
            gap: 12px;
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            background-color: #ff0000;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .video-details h3 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .video-metadata {
            font-size: 12px;
            color: #aaa;
        }

        /* Loading / Empty state */
        .loading-msg {
            grid-column: 1 / -1;
            text-align: center;
            color: #aaa;
            padding: 40px 0;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 72px;
            }
            .sidebar-item span {
                display: none;
            }
            .main {
                margin-left: 72px;
            }
            .videos-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <span class="menu-icon">&#9776;</span>
            <a href="#" class="logo">
                <div class="logo-icon">
                    <span style="color:white;font-size:16px;">&#9654;</span>
                </div>
                &nbsp;YouTube
            </a>
        </div>

        <div class="header-center">
            <input type="text" class="search-bar" placeholder="Pesquisar">
            <button class="search-btn">&#128269;</button>
        </div>

        <div class="header-right">
            <span class="header-icon">&#128249;</span>
            <span class="header-icon">&#128276;</span>
            <div class="user-avatar"></div>
        </div>
    </header>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-item active">
            <span>&#127968;</span>
            <span>In&iacute;cio</span>
        </div>
        <div class="sidebar-item">
            <span>&#128293;</span>
            <span>Explorar</span>
        </div>
        <div class="sidebar-item">
            <span>&#128250;</span>
            <span>Shorts</span>
        </div>
        <div class="sidebar-item">
            <span>&#128218;</span>
            <span>Inscri&ccedil;&otilde;es</span>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-item">
            <span>&#128218;</span>
            <span>Biblioteca</span>
        </div>
        <div class="sidebar-item">
            <span>&#9201;</span>
            <span>Hist&oacute;rico</span>
        </div>
        <div class="sidebar-item">
            <span>&#127916;</span>
            <span>Seus v&iacute;deos</span>
        </div>
        <div class="sidebar-item">
            <span>&#9200;</span>
            <span>Assistir mais tarde</span>
        </div>
        <div class="sidebar-item">
            <span>&#128077;</span>
            <span>V&iacute;deos marcados</span>
        </div>
    </nav>

    <!-- Main -->
    <main class="main">
        <div class="categories">
            <button class="category-btn active">Tudo</button>
            <button class="category-btn">M&uacute;sica</button>
            <button class="category-btn">Jogos</button>
            <button class="category-btn">Programa&ccedil;&atilde;o</button>
            <button class="category-btn">Not&iacute;cias</button>
            <button class="category-btn">Esportes</button>
            <button class="category-btn">Culin&aacute;ria</button>
            <button class="category-btn">Cinema</button>
        </div>

        <div class="videos-grid" id="videosGrid">
            <p class="loading-msg">Carregando v&iacute;deos...</p>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000';

        const emojis = ['\uD83C\uDFAE', '\uD83C\uDFB5', '\uD83C\uDF55', '\u26BD', '\uD83D\uDCBB', '\uD83C\uDFAC', '\uD83D\uDCF1', '\uD83D\uDE80', '\uD83C\uDFA8', '\uD83D\uDCDA', '\uD83C\uDFC6', '\uD83C\uDF1F'];

        async function carregarVideos() {
            const grid = document.getElementById('videosGrid');

            try {
                const resp = await fetch(API_URL + '/api/videos');

                if (!resp.ok) throw new Error('Erro ao buscar videos');

                const videos = await resp.json();

                grid.innerHTML = '';

                if (videos.length === 0) {
                    grid.innerHTML = '<p class="loading-msg">Nenhum v&iacute;deo encontrado. Adicione v&iacute;deos na pasta do servidor.</p>';
                    return;
                }

                videos.forEach((video, i) => {
                    const card = document.createElement('a');
                    card.className = 'video-card';
                    card.href = 'watch.html?id=' + video.id;

                    const thumbContent = video.thumbnail
                        ? '<img src="' + API_URL + video.thumbnail + '" alt="' + video.title + '">'
                        : '<span>' + (emojis[i % emojis.length]) + '</span>';

                    card.innerHTML =
                        '<div class="video-thumbnail">'
                        + thumbContent
                        + '<div class="video-duration">' + (video.duration || '00:00') + '</div>'
                        + '</div>'
                        + '<div class="video-info">'
                        + '<div class="channel-avatar"></div>'
                        + '<div class="video-details">'
                        + '<h3>' + video.title + '</h3>'
                        + '<div class="video-metadata">'
                        + '<div>' + video.channel + '</div>'
                        + '<div>' + video.views + ' &bull; ' + video.date + '</div>'
                        + '</div>'
                        + '</div>'
                        + '</div>';

                    grid.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                grid.innerHTML = '<p class="loading-msg">&#x26A0; N&atilde;o foi poss&iacute;vel conectar ao servidor. Certifique-se de que o backend est&aacute; rodando em <strong>http://localhost:3000</strong></p>';
            }
        }

        carregarVideos();
    </script>

</body>
</html>
