<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistir - YouTube Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <span class="menu-icon">&#9776;</span>
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <span style="color:white;font-size:16px;">&#9654;</span>
                </div>
                &nbsp;YouTube
            </a>
        </div>

        <div class="header-center">
            <input type="text" class="search-bar" placeholder="Pesquisar">
            <button class="search-btn">&#128269;</button>
        </div>

        <div class="header-right">
            <span class="header-icon">&#128249;</span>
            <span class="header-icon">&#128276;</span>
            <div class="user-avatar"></div>
        </div>
    </header>

    <!-- Watch Content -->
    <div class="watch-container">
        <a href="index.html" class="back-btn">&#8592; Voltar para in&iacute;cio</a>

        <div id="watchContent">
            <p class="error-msg">Carregando v&iacute;deo...</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        async function carregarVideo() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const content = document.getElementById('watchContent');

            if (!id) {
                content.innerHTML = '<p class="error-msg">&#x26A0; Nenhum v&iacute;deo selecionado. <a href="index.html" style="color:#fff;">Voltar ao in&iacute;cio</a></p>';
                return;
            }

            try {
                const resp = await fetch(API_URL + '/api/videos');
                if (!resp.ok) throw new Error('Erro na API');

                const videos = await resp.json();
                const video = videos.find(v => v.id === id);

                if (!video) {
                    content.innerHTML = '<p class="error-msg">&#x26A0; V&iacute;deo n&atilde;o encontrado. <a href="index.html" style="color:#fff;">Voltar ao in&iacute;cio</a></p>';
                    return;
                }

                document.title = video.title + ' - YouTube Clone';

                content.innerHTML =
                    '<div class="player-wrapper">'
                    + '<video id="player" controls autoplay>'
                    + '<source src="' + API_URL + video.src + '" type="video/mp4">'
                    + 'Seu navegador n&atilde;o suporta o elemento de v&iacute;deo.'
                    + '</video>'
                    + '</div>'
                    + '<div class="video-info-section">'
                    + '<h1>' + video.title + '</h1>'
                    + '<div class="video-channel-row">'
                    + '<div class="channel-avatar"></div>'
                    + '<div>'
                    + '<div class="channel-name">' + video.channel + '</div>'
                    + '<div class="video-meta">' + video.views + ' &bull; ' + video.date + '</div>'
                    + '</div>'
                    + '</div>'
                    + '</div>';

            } catch (err) {
                console.error(err);
                content.innerHTML = '<p class="error-msg">&#x26A0; N&atilde;o foi poss&iacute;vel conectar ao servidor. Verifique se o backend est&aacute; rodando em <strong>http://localhost:3000</strong></p>';
            }
        }

        carregarVideo();
    </script>

</body>
</html>
